<html>

<head align=" center"> Mega Scholarship 2026
</head>

<body bgcolor="#FFDAB7">
    <marquee direction="left"><h1 align="center"><b>Scholarship Form </b></h1></marquee>
    <form>
        <fieldset>
            <legend align="center">Student Info</legend>
            <label>Name:</label>
            <input type="text"><br>
            <label>Email:</label>
            <input type="email"><br>
            <label>Phone Number:</label>
            <input type="number"><br>
            <label>Date of Birth:</label>
            <input type="date"><br>
            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other<br>
            <label>Father's Name:</label>
            <input type="text"><br>
            <label>Mother's Name:</label>
            <input type="text"><br>
            <label>Enter Aadhar Number:</label>
            <input type="number"><br>
            <label>Address:</label>
            <input type="text"><br>
            <label>City:</label>
            <input type="text"><br>
            <label>State:</label>
            <input type="text"><br>
            <label>Pincode:</label>
            <input type="number">
        </fieldset>
        <fieldset>
            <legend align="center">Course Details</legend>
            Department : <select>
                <option>Computer Science </option>
                <option>Civil</option>
                <option>Mechanical</option>
                <option>Electrical</option>
                <option>Information Technology</option>
            </select><br>
            Year:
            <label>1st</label>
            <input type="radio">
            <label>2nd</label>
            <input type="radio">
            <label>3rd</label>
            <input type="radio">
            <label>4th</label>
            <input type="radio">
        </fieldset>
        <fieldset>
            <legend align="center">Schemes</legend>
            <label>Maharashtra State Scholarship</label>
            <input type="checkbox"><br>
            <label>All India Scholar Hub</label>
            <input type="checkbox"><br>
            <label>Vidya Sarthi</label>
            <input type="checkbox"><br>
            <label>MAST (Money Aid to Student)</label>
            <input type="checkbox">
        </fieldset>
        <fieldset>
            <legend align="center">Reason for Scholarship</legend>
            <label>Reason Type:</label>
            <select>
                <option>Financial Need</option>
                <option>Academic Merit</option>
                <option>Sports Achievement</option>
                <option>Community Service</option>
                <option>Other</option>
            </select><br>
            <label>Describe your reason:</label><br>
            <textarea rows="5" cols="40"></textarea><br>
            <label>Annual Family Income:</label>
            <input type="number"><br>
            <label>Any supporting documents:</label>
            <input type="file">
        </fieldset>
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>

</html>
